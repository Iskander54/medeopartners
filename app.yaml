runtime: python312
# Timeout gunicorn augmenté à 90s pour les appels LLM (limite GAE Standard = 60s frontend)
# Pour les réponses LLM longues, envisager GAE Flexible (env: flex) qui n'a pas cette limite
entrypoint: gunicorn -w 2 --timeout 90 --worker-class sync run:app

automatic_scaling:
  max_instances: 20

handlers:
- url: /.*
  script: auto
  secure: always


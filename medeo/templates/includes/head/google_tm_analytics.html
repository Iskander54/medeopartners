<!-- Google Tag Manager and Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XNNEV4QVDK"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-11452962790"></script>
<script>
   window.dataLayer = window.dataLayer || [];
   function gtag() { dataLayer.push(arguments); }
   gtag('js', new Date());
   
   // Configuration Google Analytics 4
   gtag('config', 'G-XNNEV4QVDK', {
       'page_title': document.title,
       'page_location': window.location.href,
       'page_path': window.location.pathname,
       'language': '{{ g.lang_code or "fr" }}',
       'send_page_view': true
   });
   
   // Configuration Google Ads Conversion
   gtag('config', 'AW-11452962790');
   
   // Tracking des événements personnalisés
   document.addEventListener('DOMContentLoaded', function() {
       // Track les clics sur les liens externes
       document.querySelectorAll('a[href^="http"]').forEach(function(link) {
           if (!link.href.includes(window.location.hostname)) {
               link.addEventListener('click', function() {
                   gtag('event', 'click', {
                       'event_category': 'outbound',
                       'event_label': link.href,
                       'transport_type': 'beacon'
                   });
               });
           }
       });
       
       // Track les soumissions de formulaires
       document.querySelectorAll('form').forEach(function(form) {
           form.addEventListener('submit', function() {
               gtag('event', 'form_submit', {
                   'event_category': 'engagement',
                   'event_label': form.id || form.action,
                   'value': 1
               });
           });
       });
       
       // Track les téléchargements de fichiers
       document.querySelectorAll('a[href$=".pdf"], a[href$=".doc"], a[href$=".docx"]').forEach(function(link) {
           link.addEventListener('click', function() {
               gtag('event', 'file_download', {
                   'event_category': 'download',
                   'event_label': link.href.split('/').pop(),
                   'value': 1
               });
           });
       });
   });
</script>

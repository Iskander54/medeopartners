<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
{% block meta_robots %}<meta name="robots" content="index,follow">{% endblock %}

<!-- Author -->
<meta name="author" content="Medeo Partners">

<!-- SEO -->
{% block meta_description %}
<meta name="description" content="{% if meta_description %}{{ meta_description }}{% else %}Medeo Partners, expert en comptabilité et fiscalité à Paris, optimise la gestion financière de votre entreprise avec des services personnalisés.{% endif %}">
{% endblock %}
{% block meta_keywords %}
<meta name="keywords" content="{% if meta_keywords %}{{ meta_keywords }}{% else %}Comptabilité, gestion d'entreprise, medeo partners, medeo, fiscalité, entreprise, expertise comptabilité, expert comptable, commissaire aux comptes, audit, compagnie nationale des commissaires aux comptes, ordre des experts-comptables, Paris, services financiers, optimisation fiscale, audit financier, commissariat aux comptes, conseils financiers, services comptables, gestion financière, optimisation financière{% endif %}">
{% endblock %}

<!-- Gestion des url canoniques -->
<link rel="canonical" href="https://www.medeo-partners.com{{ request.path }}">

<!-- Hreflang pour SEO multilingue -->
{% if g.lang_code == 'fr' %}
<link rel="alternate" hreflang="fr" href="https://www.medeo-partners.com{{ request.path }}">
<link rel="alternate" hreflang="en" href="https://www.medeo-partners.com{{ request.path|replace('/fr/', '/en/')|replace('/accueil', '/home')|replace('/votre_cabinet', '/your_firm')|replace('/notre_expertise', '/our_expertise')|replace('/nouscontacter', '/contactus')|replace('/actualites', '/news') }}">
{% else %}
<link rel="alternate" hreflang="en" href="https://www.medeo-partners.com{{ request.path }}">
<link rel="alternate" hreflang="fr" href="https://www.medeo-partners.com{{ request.path|replace('/en/', '/fr/')|replace('/home', '/accueil')|replace('/your_firm', '/votre_cabinet')|replace('/our_expertise', '/notre_expertise')|replace('/contactus', '/nouscontacter')|replace('/news', '/actualites') }}">
{% endif %}
<link rel="alternate" hreflang="x-default" href="https://www.medeo-partners.com/fr/accueil">

<!-- Bing Webmaster Tools verification -->
<!-- Remplacer la valeur content par ton code depuis https://www.bing.com/webmasters -->
<meta name="msvalidate.01" content="REMPLACER_PAR_CODE_BING">

<!-- Favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon_io/apple-touch-icon.png') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon_io/favicon-32x32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon_io/favicon-16x16.png') }}">
<link rel="manifest" href="{{ url_for('static', filename='images/favicon_io/site.webmanifest') }}">

<!-- Preconnect -->
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://unpkg.com">

<link rel="preload" href="{{ url_for('static', filename='medeo_images/Medeo_partners_couleur.webp') }}" as="image">

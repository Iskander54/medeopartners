<!-- Twitter / X Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:image" content="{% if og_image %}{{ og_image }}{% else %}https://www.medeo-partners.com/static/images/twitter_image.jpg{% endif %}">
